name: rust-ci

on:
  push:
    branches: [develop]
  pull_request:

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation hurts cache hit rate in CI — every run sees
  # different fingerprints and target/ grows unboundedly.
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  # -----------------------------------------------------------------
  # build — `cargo check` against the whole workspace.
  # -----------------------------------------------------------------
  build:
    name: build (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native-deps

      # Toolchain channel is read from rust-toolchain.toml at the repo
      # root. Update that file, not this workflow, to bump Rust.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Don't let the action set RUSTFLAGS
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci
          cache-on-failure: true

      # channelwasm excluded: doesn't compile on native targets currently.
      # Re-include once fixed.
      - name: cargo check --workspace
        run: cargo check --workspace --locked --exclude channelwasm

  # -----------------------------------------------------------------
  # test — `cargo nextest run` against the whole workspace.
  # -----------------------------------------------------------------
  test:
    name: test (cargo nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Don't let the action set RUSTFLAGS
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # channelwasm excluded: see comment in build job above.
      #
      # The list of temporarily-skipped failing tests lives in
      # .config/nextest.toml `default-filter` (e2e_consensus binary +
      # 8 individually-named tests). Keep that list in one place rather
      # than splitting between YAML and config.
      - name: cargo nextest run --workspace
        if: false # temporarily disabled due to test linking issue
        run: cargo nextest run --workspace --locked --no-fail-fast --exclude channelwasm

  # ------------------------------------------------------------------
  # release-build — verify `node/build.sh` succeeds on every supported
  # deployment target.
  # ------------------------------------------------------------------
  release-build:
    name: release-build (${{ matrix.name }})
    # Gate the (slow, matrixed) release builds on `cargo check` passing —
    # no point burning three runners on a release build if the workspace
    # doesn't even compile in debug.
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-latest
            quil_platform: amd64_linux
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            quil_platform: arm64_linux
          - name: macos-arm64
            runs-on: macos-14
            quil_platform: arm64_macos
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - id: native-deps
        uses: ./.github/actions/setup-native-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Don't let the action set RUSTFLAGS
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          # Per-target cache key — release target/ dirs don't overlap
          # with the debug target/ used by build+test, and the three
          # release targets don't overlap with each other.
          shared-key: rust-release-${{ matrix.name }}
          cache-on-failure: true

      - name: build release node binary
        env:
          QUIL_PLATFORM: ${{ matrix.quil_platform }}
          # macOS only: point node/build.sh at the source-built static
          # flint so the release binary doesn't depend on
          # libflint.dylib at runtime. On Linux, build.rs picks up the
          # /usr/local install automatically (FLINT_DIR unset).
          FLINT_DIR: ${{ runner.os == 'macOS' && steps.native-deps.outputs.flint-dir || '' }}
        run: bash node/build.sh
