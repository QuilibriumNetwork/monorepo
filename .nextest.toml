# cargo-nextest configuration.
#
# `default-filter` lists tests that are temporarily skipped because they
# fail today. Each entry is paired with a comment naming the failure so
# the next person knows which bug to chase before re-enabling. Remove
# the corresponding clause once the test passes.
#
# Filter DSL reference: https://nexte.st/docs/filtersets/

nextest-version = { required = "0.9.75" }

[profile.default]
# A single filter expression — newline-joined `and not (...)` clauses
# so individual entries are easy to add/remove. Filter expressions are
# whitespace-tolerant, so the multi-line form parses identically to
# one long line.
default-filter = """
    not (package(quil-engine) and binary(=e2e_consensus)) \
"""

# Per-skip notes (kept here so they don't bloat the filter expression).
#
# quil-engine::e2e_consensus (whole binary)
#   Tier-1 in-process multi-node consensus tests — archive ↔ non-archive
#   HotStuff + app-shard flow currently fails. Mid-stabilization.
